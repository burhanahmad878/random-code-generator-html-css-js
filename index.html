<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
    <div class="main">
        <div class="box">
            <span id="pass-box">Testing</span>

            <div class="row">
                <div class="left">Password Length</div>
                <div class="right">
                    <input type="number" id="total-char" max="30" min="2" value="10">
                </div>
            </div>
            <div class="row">
                <button id="copy-btn">Copy</button>
            </div>

            <div class="row">
                <div id="strength-text">Strength: </div>
            </div>

            <div class="row">
                <label class="left" for="upper-case">Contains Uppercase</label>
                <div class="right">
                    <input type="checkbox" id="upper-case" checked>
                </div>
            </div>

            <div class="row">
                <label class="left" for="lower-case">Contains Lowercase</label>
                <div class="right">
                    <input type="checkbox" id="lower-case">
                </div>
            </div>

            <div class="row">
                <label class="left" for="numbers">Contains Numbers</label>
                <div class="right">
                    <input type="checkbox" id="numbers">
                </div>
            </div>

            <div class="row">
                <label class="left" for="symbols">Contains Symbols</label>
                <div class="right">
                    <input type="checkbox" id="symbols">
                </div>
            </div>
            <div class="row">
                <button id="toggle-theme">Toggle Dark/Light</button>
            </div>

            <div class="row">
                <div id="history-box"></div>
            </div>
            <div class="row">
                <button id="btn">Generate</button>
            </div>
        </div>
    </div>

    <!-- IMPORTANT: Make sure path is correct -->
    <script src="java.js"></script>

</html>
